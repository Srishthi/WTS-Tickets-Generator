<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTS Ticket Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎫 WTS Ticket Generator</h1>

    <p class="subtitle">
        Wadhwa's Tambola Studio
    </p>

    <div class="card">

        <label>Number of Tickets</label>

        <input
            id="ticketCount"
            type="number"
            value="10"
            min="1"
            max="1000">

        <label>Starting WTS Number</label>

        <input
            id="startNumber"
            type="number"
            value="1"
            min="1">

        <button id="generateBtn">
            Generate Tickets
        </button>

    </div>

    <div id="status"></div>

    <div id="preview"></div>

</div>

<script src="generator.js"></script>
<script src="app.js"></script>

</body>
</html>
